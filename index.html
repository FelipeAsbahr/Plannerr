<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-tasks"></i> Meu Gerenciador de Tarefas</h1>
            <nav class="nav-tabs">
                <button class="nav-btn active" data-tab="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </button>
                <button class="nav-btn" data-tab="tasks">
                    <i class="fas fa-list"></i> Todas as Tarefas
                </button>
            </nav>
        </header>

        <!-- Dashboard Tab -->
        <main class="tab-content active" id="dashboard">
            <div class="dashboard-grid">
                <!-- Atividades Atuais -->
                <section class="card">
                    <h2><i class="fas fa-clock"></i> Atividades Atuais</h2>
                    <div class="tasks-current" id="tasksCurrent"></div>
                </section>

                <!-- Próximas Atividades -->
                <section class="card">
                    <h2><i class="fas fa-calendar-plus"></i> Próximas Atividades</h2>
                    <div class="tasks-upcoming" id="tasksUpcoming"></div>
                </section>

                <!-- Estatísticas -->
                <section class="card stats-card">
                    <h2><i class="fas fa-chart-bar"></i> Estatísticas</h2>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-number" id="totalTasks">0</span>
                            <span>Total</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="completedTasks">0</span>
                            <span>Concluídas</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="overdueTasks">0</span>
                            <span>Atrasadas</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="avgProgress">0%</span>
                            <span>Média Geral</span>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Tasks Tab -->
        <main class="tab-content" id="tasks">
            <!-- Filtros -->
            <div class="filters">
                <div class="filter-group">
                    <label>Filtrar por Mês:</label>
                    <input type="month" id="monthFilter">
                </div>
                <div class="filter-group">
                    <label>Status:</label>
                    <select id="statusFilter">
                        <option value="">Todos</option>
                        <option value="not-started">Não Iniciada</option>
                        <option value="in-progress">Em Andamento</option>
                        <option value="completed">Concluída</option>
                        <option value="overdue">Atrasada</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="taskManager.showAddTaskModal()">
                    <i class="fas fa-plus"></i> Nova Tarefa
                </button>
            </div>

            <!-- Lista de Tarefas -->
            <div class="tasks-list" id="tasksList"></div>
        </main>

        <!-- Modal Nova/Editar Tarefa -->
        <div class="modal" id="taskModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Nova Tarefa</h3>
                    <button class="close-btn" onclick="taskManager.closeModal()">&times;</button>
                </div>
                <form id="taskForm">
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Nome da Tarefa:</label>
                        <input type="text" id="taskName" placeholder="Ex: Desenvolver novo dashboard" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-calendar-day"></i> Data Início:</label>
                            <input type="date" id="startDate" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-calendar-check"></i> Data Fim:</label>
                            <input type="date" id="endDate" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-align-left"></i> Descrição:</label>
                        <textarea id="description" placeholder="Detalhes opcionais da tarefa..."></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-list-ul"></i> Subtarefas:</label>
                        <div id="subtasksContainer"></div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" onclick="taskManager.closeModal()">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> Salvar Tarefa
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Toast Notification -->
        <div class="toast" id="toast"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
